name: Music Assistant
version: 2.7.11-patch.09d4a5f
slug: music_assistant_youtube
description: Music Assistant Server with YouTube provider (yt-dlp) injected
url: https://github.com/giantorth/music-assistant-yt-dlp
arch:
  - amd64
  - aarch64
homeassistant_api: true
discovery:
  - music_assistant
auth_api: true
host_network: true
ingress: true
ingress_port: 8094
panel_icon: mdi:bookshelf
panel_title: Music Assistant
panel_admin: false
uart: false
apparmor: true
map:
  - media:rw
  - ssl:ro
init: false
advanced: false
backup_exclude:
  - cache.db
  - collage_images/*
  - .cache/*
stage: stable
image: ghcr.io/giantorth/music-assistant-yt-dlp/{arch}
tmpfs: true
options:
  log_level: info
  safe_mode: false
schema:
  log_level: list(debug|info|warning|error)
  safe_mode: bool
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
