name: Build and Publish Container

on:
  push:
    branches: [main]
    paths:
      - "music_assistant_youtube/**"
      - ".github/workflows/build.yaml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      base_tag: ${{ steps.version.outputs.base_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE=""
          if [ -f .upstream-version ]; then
            BASE=$(cat .upstream-version)
          fi
          # Never use "latest" — resolve to actual upstream release
          if [ -z "$BASE" ] || [ "$BASE" = "latest" ]; then
            BASE=$(gh api repos/music-assistant/server/releases/latest --jq '.tag_name')
          fi
          echo "base_tag=$BASE" >> "$GITHUB_OUTPUT"

          # For push events (provider changes), append a patch suffix
          # For release events (upstream bumps), use the upstream version as-is
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${BASE}-patch.$(git rev-parse --short HEAD)"
          else
            VERSION="$BASE"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update config.yaml version
        if: github.event_name == 'push'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" music_assistant_youtube/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add music_assistant_youtube/config.yaml
          git commit -m "chore: bump version to ${VERSION}" || true
          git push || true

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract arch suffix
        id: arch
        run: |
          PLATFORM="${{ matrix.platform }}"
          ARCH="${PLATFORM#linux/}"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: music_assistant_youtube
          file: music_assistant_youtube/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/music-assistant/server:${{ needs.prepare.outputs.base_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/music-assistant-yt-dlp/${{ steps.arch.outputs.arch }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/music-assistant-yt-dlp/${{ steps.arch.outputs.arch }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BASE_TAG: ${{ needs.prepare.outputs.base_tag }}
        run: |
          gh release create "$VERSION" \
            --title "Provider update $VERSION" \
            --notes "Provider code change rebuild based on upstream Music Assistant \`$BASE_TAG\`." \
            --latest
